<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Rádio GV 💛</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Playfair+Display:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --amarelo-suave:   #FFF8E1;
    --amarelo-claro:   #FFECB3;
    --amarelo-medio:   #FFD54F;
    --amarelo-forte:   #FFC107;
    --dourado:         #E6A817;
    --dourado-escuro:  #B8860B;
    --creme:           #FFFDF6;
    --texto:           #5A4A2A;
    --texto-suave:     #8A7A55;
    --sombra:          rgba(184, 134, 11, 0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Quicksand', sans-serif;
    color: var(--texto);
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 20% 12%, var(--amarelo-claro) 0%, transparent 45%),
      radial-gradient(circle at 85% 88%, var(--amarelo-suave) 0%, transparent 50%),
      linear-gradient(160deg, var(--creme) 0%, var(--amarelo-suave) 100%);
    -webkit-font-smoothing: antialiased;
  }

  /* corações de fundo */
  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal { position: absolute; top: -40px; opacity: 0.6; animation: fall linear infinite; will-change: transform; }
  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10% { opacity: .6; } 90% { opacity: .6; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  /* ====== TELA "LIGAR O RÁDIO" ====== */
  #ligar {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(160deg, var(--amarelo-suave), var(--amarelo-claro));
    transition: opacity 0.8s ease, visibility 0.8s ease;
    padding: 24px;
    cursor: pointer;
  }
  #ligar.oculto { opacity: 0; visibility: hidden; }
  #ligar .disco-grande { font-size: 78px; animation: bater 1.8s ease-in-out infinite; filter: drop-shadow(0 8px 20px var(--sombra)); }
  @keyframes bater { 0%,100%{transform:scale(1);} 15%{transform:scale(1.14);} 30%{transform:scale(1);} 45%{transform:scale(1.1);} }
  #ligar h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 8vw, 44px); color: var(--dourado-escuro); margin-top: 22px; }
  #ligar p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(17px, 4.5vw, 22px); color: var(--texto-suave); margin-top: 8px; }
  #ligar .toque {
    margin-top: 26px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--dourado-escuro); border: 1.5px solid var(--amarelo-forte); background: rgba(255,255,255,0.4);
    padding: 12px 28px; border-radius: 999px; animation: pulsar 2s ease-in-out infinite;
  }
  @keyframes pulsar { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

  /* ====== CONSOLE ====== */
  .radio {
    width: 100%;
    max-width: 430px;
    background: linear-gradient(170deg, #fffefb, var(--creme));
    border: 1px solid var(--amarelo-claro);
    border-radius: 30px;
    box-shadow: 0 30px 70px var(--sombra), inset 0 1px 0 rgba(255,255,255,0.8);
    padding: 24px 24px 26px;
    position: relative;
    z-index: 2;
  }
  .radio::before {
    content: "";
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    width: 54px; height: 5px; border-radius: 999px;
    background: var(--amarelo-medio); opacity: .6;
  }

  .topo { display: flex; align-items: flex-start; justify-content: space-between; margin: 12px 0 18px; }
  .marca { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 22px; color: var(--texto); letter-spacing: 0.5px; }
  .marca span { color: var(--dourado-escuro); }
  .freq { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--texto-suave); margin-top: 3px; }
  .no-ar { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dourado-escuro); }
  .no-ar .ponto { width: 9px; height: 9px; border-radius: 50%; background: #E5533D; animation: piscarAr 1.4s ease-in-out infinite; }
  @keyframes piscarAr { 0%,100%{ box-shadow: 0 0 0 0 rgba(229,83,61,0.6); opacity: 1; } 50%{ box-shadow: 0 0 0 7px rgba(229,83,61,0); opacity: .6; } }

  /* toca-discos */
  .prato { position: relative; width: 236px; height: 236px; margin: 8px auto 20px; }
  .disco {
    width: 236px; height: 236px; border-radius: 50%;
    background:
      radial-gradient(circle at center, transparent 0 30%, rgba(0,0,0,0.28) 30% 31%, transparent 31.4%),
      repeating-radial-gradient(circle at center, #37301f 0 2px, #241d13 2px 5px);
    box-shadow: 0 16px 34px var(--sombra), inset 0 0 22px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    animation: girar 6s linear infinite; animation-play-state: paused;
    position: relative;
  }
  body.tocando .disco { animation-play-state: running; }
  .disco::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent 40%, transparent 60%, rgba(255,255,255,0.08));
    pointer-events: none;
  }
  .disco-foto {
    width: 92px; height: 92px; border-radius: 50%; object-fit: cover;
    border: 4px solid var(--creme);
    box-shadow: 0 0 0 5px var(--amarelo-forte), 0 4px 12px rgba(0,0,0,0.4);
    z-index: 1;
  }
  /* braço/agulha */
  .braco {
    position: absolute; top: -10px; right: -6px; width: 118px; height: 118px;
    transform-origin: 92% 12%; transform: rotate(-32deg);
    transition: transform 0.9s cubic-bezier(.5,1.4,.5,1); z-index: 3; pointer-events: none;
  }
  body.tocando .braco { transform: rotate(-6deg); }
  .braco .haste { position: absolute; top: 8%; right: 8%; width: 8px; height: 78%; background: linear-gradient(var(--dourado), var(--dourado-escuro)); border-radius: 6px; transform: rotate(20deg); transform-origin: top; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
  .braco .base { position: absolute; top: 2%; right: 2%; width: 26px; height: 26px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--amarelo-medio), var(--dourado-escuro)); box-shadow: 0 3px 8px var(--sombra); }
  .braco .agulha { position: absolute; bottom: 6%; left: 14%; width: 15px; height: 15px; border-radius: 50%; background: var(--amarelo-forte); box-shadow: 0 2px 5px rgba(0,0,0,0.35); }

  /* equalizador */
  .eq { display: flex; gap: 4px; align-items: flex-end; justify-content: center; height: 22px; margin-bottom: 12px; }
  .eq i { width: 4px; height: 5px; background: linear-gradient(var(--amarelo-forte), var(--dourado)); border-radius: 3px; animation: onda 0.9s ease-in-out infinite; animation-play-state: paused; }
  body.tocando .eq i { animation-play-state: running; }
  .eq i:nth-child(2){ animation-delay:.15s } .eq i:nth-child(3){ animation-delay:.35s } .eq i:nth-child(4){ animation-delay:.1s }
  .eq i:nth-child(5){ animation-delay:.4s } .eq i:nth-child(6){ animation-delay:.25s } .eq i:nth-child(7){ animation-delay:.05s }
  @keyframes onda { 0%,100%{ height:5px } 50%{ height:22px } }

  .agora-rot { text-align: center; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--dourado); }
  .titulo { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 31px; font-weight: 600; color: var(--texto); line-height: 1.12; margin-top: 3px; min-height: 36px; }
  .artista { text-align: center; font-size: 14px; color: var(--texto-suave); margin-top: 4px; letter-spacing: 0.5px; }
  .contador { text-align: center; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dourado); margin-top: 8px; opacity: .8; }
  .porque {
    margin: 12px 6px 0;
    padding: 12px 16px;
    background: var(--amarelo-suave);
    border: 1px solid var(--amarelo-claro);
    border-radius: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    line-height: 1.45;
    color: var(--texto);
    text-align: center;
    transition: opacity 0.5s ease;
  }
  .porque .rot { display: block; font-family: 'Quicksand', sans-serif; font-style: normal; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dourado); margin-bottom: 5px; }

  .progresso { margin: 16px 4px 6px; }
  .barra { height: 6px; background: var(--amarelo-claro); border-radius: 999px; overflow: hidden; cursor: pointer; }
  .barra .preenchido { height: 100%; width: 0%; background: linear-gradient(90deg, var(--amarelo-forte), var(--dourado)); border-radius: 999px; transition: width 0.2s linear; }
  .tempos { display: flex; justify-content: space-between; font-size: 11px; color: var(--texto-suave); margin-top: 7px; font-variant-numeric: tabular-nums; }

  .controles { display: flex; align-items: center; justify-content: center; gap: 22px; margin-top: 14px; }
  .ctrl { border: none; background: transparent; color: var(--dourado-escuro); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s ease; font-family: inherit; }
  .ctrl:active { transform: scale(0.9); }
  .ctrl.sec { width: 48px; height: 48px; font-size: 20px; border-radius: 50%; background: var(--amarelo-suave); box-shadow: 0 4px 12px var(--sombra); }
  .ctrl.play { width: 68px; height: 68px; border-radius: 50%; background: var(--amarelo-forte); color: #fff; font-size: 25px; box-shadow: 0 10px 22px var(--sombra); }

  /* volume */
  .volume { display: flex; align-items: center; gap: 10px; margin: 18px 8px 0; }
  .volume .icv { font-size: 15px; color: var(--dourado-escuro); }
  .volume input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 5px; border-radius: 999px; background: var(--amarelo-claro); outline: none; cursor: pointer; }
  .volume input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--amarelo-forte); border: 2px solid var(--creme); box-shadow: 0 2px 6px var(--sombra); }
  .volume input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border: 2px solid var(--creme); border-radius: 50%; background: var(--amarelo-forte); box-shadow: 0 2px 6px var(--sombra); }

  .aseguir { margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--amarelo-medio); text-align: center; }
  .aseguir .rot { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dourado); }
  .aseguir .prox { font-size: 14px; color: var(--texto-suave); margin-top: 4px; font-weight: 500; }

  .slogan { text-align: center; margin-top: 16px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--texto-suave); min-height: 22px; transition: opacity 0.6s ease; }
  @keyframes girar { to { transform: rotate(360deg); } }

  /* locutor / vinheta */
  .locucao {
    position: fixed; top: 16px; left: 50%; transform: translate(-50%, -160%);
    z-index: 60; max-width: 92vw;
    background: var(--dourado-escuro); color: var(--amarelo-suave);
    font-size: 13px; font-weight: 600; letter-spacing: .3px;
    padding: 12px 20px; border-radius: 999px;
    box-shadow: 0 12px 30px var(--sombra);
    display: flex; align-items: center; gap: 10px;
    opacity: 0; transition: transform 0.6s cubic-bezier(.5,1.4,.5,1), opacity 0.5s ease;
    pointer-events: none;
  }
  .locucao.mostrar { transform: translate(-50%, 0); opacity: 1; }
  .locucao .mic { font-size: 15px; flex: 0 0 auto; }
</style>
</head>
<body>

  <div class="petals" id="petals"></div>

  <div class="locucao" id="locucao"><span class="mic">🎙️</span><span id="locTxt"></span></div>

  <!-- ====== TELA LIGAR ====== -->
  <div id="ligar">
    <div class="disco-grande">💛</div>
    <h1>rádio gv</h1>
    <p>a estação do nosso amor, tocando sem parar</p>
    <div class="toque">toque para ligar o rádio</div>
  </div>

  <!-- ====== CONSOLE ====== -->
  <div class="radio">
    <div class="topo">
      <div>
        <div class="marca">rádio <span>gv</span></div>
        <div class="freq">107.25</div>
      </div>
      <div class="no-ar"><span class="ponto"></span> no ar</div>
    </div>

    <div class="prato">
      <div class="disco" id="disco">
        <img class="disco-foto" id="discoFoto" src="fotos/beijo.jpg" alt="" />
      </div>
      <div class="braco"><span class="base"></span><span class="haste"></span><span class="agulha"></span></div>
    </div>

    <div class="eq"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <div class="agora-rot">tocando agora</div>
    <div class="titulo" id="titulo">—</div>
    <div class="artista" id="artista"></div>
    <div class="contador" id="contador"></div>

    <div class="porque" id="porque"><span class="rot">por que essa é nossa</span><span id="porqueTxt"></span></div>

    <div class="progresso">
      <div class="barra" id="barra"><div class="preenchido" id="preenchido"></div></div>
      <div class="tempos"><span id="tAtual">0:00</span><span id="tTotal">0:00</span></div>
    </div>

    <div class="controles">
      <button class="ctrl sec" id="btnPrev" title="Anterior">⏮</button>
      <button class="ctrl play" id="btnPlay" title="Play/Pause"><span id="ico">❚❚</span></button>
      <button class="ctrl sec" id="btnNext" title="Próxima">⏭</button>
    </div>

    <div class="volume">
      <span class="icv">🔉</span>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="1" />
    </div>

    <div class="aseguir">
      <div class="rot">a seguir</div>
      <div class="prox" id="prox">—</div>
    </div>

    <div class="slogan" id="slogan">no ar, só pra você.</div>
  </div>

  <audio id="audio"></audio>

<script>
  /* ====== PLAYLIST (34 músicas de vocês) ====== */
  const PLAYLIST = [
    { src: 'musicas/Mania De Você.mp3',                                                    nome: 'mania de você',            artista: 'rita lee' },
    { src: 'musicas/Tribalistas - Velha Infância.mp3',                                     nome: 'velha infância',           artista: 'tribalistas' },
    { src: 'musicas/Marisa Monte - Beija Eu.mp3',                                          nome: 'beija eu',                 artista: 'marisa monte' },
    { src: 'musicas/Djavan - Um Amor Puro (Áudio Oficial).mp3',                            nome: 'um amor puro',             artista: 'djavan' },
    { src: 'musicas/Miúcha, Antonio Carlos Jobim - Pela Luz dos Olhos Teus (Pseudo Vídeo).mp3', nome: 'pela luz dos olhos teus', artista: 'miúcha & tom jobim' },
    { src: 'musicas/Vanessa da Mata - Ainda Bem (Áudio Oficial).mp3',                      nome: 'ainda bem',                artista: 'vanessa da mata' },
    { src: 'musicas/Maria Bethânia - Cheiro De Amor (Lyric Video).mp3',                    nome: 'cheiro de amor',           artista: 'maria bethânia' },
    { src: 'musicas/ANAVITÓRIA, Lenine - Lisboa (visualizer).mp3',                         nome: 'lisboa',                   artista: 'anavitória & lenine' },
    { src: 'musicas/ANAVITÓRIA - Cor de Marte (Ao vivo na Fundição).mp3',                  nome: 'cor de marte',             artista: 'anavitória' },
    { src: 'musicas/ANAVITÓRIA - Espetáculo estranho.mp3',                                 nome: 'espetáculo estranho',      artista: 'anavitória' },
    { src: 'musicas/ANAVITÓRIA - Ter o coração no chão.mp3',                               nome: 'ter o coração no chão',    artista: 'anavitória' },
    { src: 'musicas/Rubel - Partilhar [Áudio Oficial].mp3',                                nome: 'partilhar',                artista: 'rubel' },
    { src: 'musicas/Lagum - Deixa (Letra)  ft. Ana Gabriela.mp3',                          nome: 'deixa',                    artista: 'lagum' },
    { src: 'musicas/Pitty - Equalize.mp3',                                                 nome: 'equalize',                 artista: 'pitty' },
    { src: 'musicas/Rita Lee - Minha Vida (In My Life) - Tema da Novela Espelho da Vida.mp3', nome: 'minha vida',            artista: 'rita lee' },
    { src: 'musicas/Caso Sério.mp3',                                                       nome: 'caso sério',               artista: '' },
    { src: 'musicas/Xuxuzinho.mp3',                                                        nome: 'xuxuzinho',                artista: '' },
    { src: 'musicas/Olha.mp3',                                                             nome: 'olha',                     artista: '' },
    { src: 'musicas/Pelo Tempo Que Durar.mp3',                                             nome: 'pelo tempo que durar',     artista: '' },
    { src: 'musicas/Será que é amor (Ao vivo).mp3',                                        nome: 'será que é amor',          artista: '' },
    { src: 'musicas/Foi Assim.mp3',                                                        nome: 'foi assim',                artista: 'sotam, rob, pulim' },
    { src: 'musicas/Combo da Sorte.mp3',                                                   nome: 'combo da sorte',           artista: 'marina sena' },
    { src: 'musicas/Deusa.mp3',                                                            nome: 'deusa',                    artista: 'bk, 2zdinizz, anchietx' },
    { src: 'musicas/5 Linguagens do Amor.mp3',                                             nome: '5 linguagens do amor',     artista: 'nandatsunami, mello santana' },
    { src: 'musicas/Born To Die.mp3',                                                      nome: 'born to die',              artista: 'lana del rey' },
    { src: 'musicas/POV.mp3',                                                              nome: 'pov',                      artista: 'ariana grande' },
    { src: 'musicas/Dangerously In Love.mp3',                                              nome: 'dangerously in love',      artista: 'beyoncé' },
    { src: 'musicas/Amado.mp3',                                                            nome: 'amado',                    artista: 'vanessa da mata' },
    { src: 'musicas/Musica de Amor.mp3',                                                   nome: 'música de amor',           artista: 'anitta' },
    { src: 'musicas/Cravo e Canela.mp3',                                                   nome: 'cravo e canela',           artista: 'anitta, vitin' },
    { src: 'musicas/Andanca.mp3',                                                          nome: 'andança',                  artista: 'beth carvalho' },
    { src: 'musicas/Ritmo Perfeito.mp3',                                                   nome: 'ritmo perfeito',           artista: 'anitta' },
    { src: 'musicas/Oceano.mp3',                                                           nome: 'oceano',                   artista: 'djavan' },
    { src: 'musicas/Gabriela.mp3',                                                         nome: 'gabriela',                 artista: 'jorge ben jor' },
  ];

  /* o "porquê" de cada música (mesma ordem da PLAYLIST) */
  const PORQUES = [
    'porque é exatamente isso que eu tenho por você. uma mania boa, dessas que não passam.',
    'você é a minha melhor amiga e o meu amor no mesmo abraço. essa música é a nossa cara.',
    'a trilha perfeita pra lembrar do nosso primeiro beijo, lá no ponto de ônibus do gramacho.',
    'porque o que eu sinto por você não tem segunda intenção nenhuma. é puro, do jeito do djavan.',
    'porque eu me perco toda vez que olho nos seus olhos. e não faço questão de me achar.',
    'ainda bem que eu te encontrei. a minha gratidão em forma de música por ter você.',
    'a nossa música. foi tudo tão de repente, você quase disse não, mas o seu jeito de me olhar falou mais alto.',
    'pros dias em que a saudade aperta, mesmo com você por perto.',
    'porque com você até outro planeta parece estar logo ali do lado.',
    'porque me apaixonar por você foi o espetáculo mais estranho e mais lindo que eu já vivi.',
    'porque com você eu deixei o coração no chão, sem medo de me entregar.',
    'porque eu quero partilhar tudo com você. os dias bons e os difíceis também.',
    'deixa a gente acontecer. foi o que a gente fez, e olha no que deu.',
    'porque a gente se sintonizou na mesma frequência.',
    'porque em toda a minha vida, entre tantos lugares e pessoas, é você que eu amo mais.',
    'porque desde o comecinho isso nunca foi brincadeira. sempre foi caso sério.',
    'pela nossa fofura e os apelidos bobos que só a gente tem.',
    'olha só onde a gente foi chegar. de uma implicância boba a um ano de nós.',
    'que dure muito. mas, pelo tempo que durar, que seja intenso como é.',
    'no comecinho eu me perguntava isso. hoje eu já sei a resposta. é amor.',
    'porque foi assim mesmo, sem planejar, que a gente aconteceu.',
    'porque te encontrar foi o maior combo de sorte da minha vida.',
    'porque é isso que você é pra mim: uma deusa.',
    'porque com você eu aprendi todas as linguagens do amor.',
    'porque eu escolheria você em qualquer vida.',
    'porque, do meu ponto de vista, não existe ninguém como você.',
    'porque eu estou perigosamente apaixonado por você.',
    'porque perto de você eu me sinto o mais amado do mundo.',
    'porque tudo o que eu vivo com você vira música de amor.',
    'porque você tem esse gostinho de aconchego, de cravo e canela.',
    'porque em toda a minha andança, foi em você que eu quis parar.',
    'porque a gente encontrou o nosso ritmo perfeito.',
    'porque o que eu sinto por você é fundo que nem oceano.',
    'porque essa é a sua música. o seu nome, a minha pessoa preferida.',
  ];
  PLAYLIST.forEach((t, i) => { t.pq = PORQUES[i]; });

  /* fotos que giram como rótulo do vinil (troca a cada música) */
  const FOTOS = ['fotos/beijo.jpg', 'fotos/primeira.jpg', 'fotos/foto1.jpg', 'fotos/foto3.jpg', 'fotos/foto4.jpg'];

  const audio   = document.getElementById('audio');
  const disco   = document.getElementById('disco');
  const discoFoto = document.getElementById('discoFoto');
  const titulo  = document.getElementById('titulo');
  const artista = document.getElementById('artista');
  const contador= document.getElementById('contador');
  const prox    = document.getElementById('prox');
  const ico     = document.getElementById('ico');
  const barra   = document.getElementById('barra');
  const preench = document.getElementById('preenchido');
  const tAtual  = document.getElementById('tAtual');
  const tTotal  = document.getElementById('tTotal');
  const slogan  = document.getElementById('slogan');
  const vol     = document.getElementById('vol');
  const porqueTxt = document.getElementById('porqueTxt');
  const locucao = document.getElementById('locucao');
  const locTxt  = document.getElementById('locTxt');

  let ordem = [], idx = 0;

  /* ====== locutor ====== */
  const DJ = [
    'essa próxima é dedicada a você, gabryella.',
    'aqui é a rádio gv, tocando só o que fala de você.',
    'sobe o som: mais uma pra nós dois.',
    'gabryella, essa música me lembra a gente.',
    'com todo o meu amor, do vitor pra você.',
    'essa entra direto na lista das nossas favoritas.',
    'no ar, a estação do nosso primeiro beijo.',
    'presta atenção na letra: é a nossa cara.',
  ];
  let djIdx = 0, locTimer = null;
  function anunciar(msg) {
    locTxt.textContent = msg;
    locucao.classList.add('mostrar');
    clearTimeout(locTimer);
    locTimer = setTimeout(() => locucao.classList.remove('mostrar'), 5200);
  }
  function djProxima() { const m = DJ[djIdx % DJ.length]; djIdx++; return m; }

  function embaralhar(a) {
    a = a.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60), r = Math.floor(s % 60);
    return m + ':' + String(r).padStart(2, '0');
  }
  function carregar(i) {
    const f = ordem[i];
    audio.src = f.src;
    titulo.textContent = f.nome;
    artista.textContent = f.artista || '';
    contador.textContent = 'faixa ' + (i + 1) + ' de ' + ordem.length;
    porqueTxt.textContent = f.pq || '';
    discoFoto.src = FOTOS[i % FOTOS.length];
    const p = ordem[(i + 1) % ordem.length];
    prox.textContent = p.artista ? (p.nome + ' · ' + p.artista) : p.nome;
  }
  function tocar() {
    audio.play().then(() => { ico.textContent = '❚❚'; document.body.classList.add('tocando'); }).catch(() => {});
  }
  function pausar() { audio.pause(); ico.textContent = '▶'; document.body.classList.remove('tocando'); }
  function proxima() {
    idx++;
    if (idx >= ordem.length) { ordem = embaralhar(PLAYLIST); idx = 0; }
    carregar(idx); tocar(); anunciar(djProxima());
  }
  function anterior() {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    idx = (idx - 1 + ordem.length) % ordem.length;
    carregar(idx); tocar();
  }

  audio.addEventListener('ended', proxima);
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      preench.style.width = (audio.currentTime / audio.duration * 100) + '%';
      tAtual.textContent = fmt(audio.currentTime);
    }
  });
  audio.addEventListener('loadedmetadata', () => { tTotal.textContent = fmt(audio.duration); });
  barra.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const r = barra.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });
  vol.addEventListener('input', () => { audio.volume = parseFloat(vol.value); });

  document.getElementById('btnPlay').addEventListener('click', () => { audio.paused ? tocar() : pausar(); });
  document.getElementById('btnNext').addEventListener('click', proxima);
  document.getElementById('btnPrev').addEventListener('click', anterior);

  const slogans = [
    'no ar, só pra você.',
    'a nossa trilha sonora, sem parar.',
    'tocando amor o dia inteiro.',
    'a estação do nosso primeiro beijo.',
    'só toca o que me lembra você.',
  ];
  let sIdx = 0;
  setInterval(() => {
    slogan.style.opacity = 0;
    setTimeout(() => { sIdx = (sIdx + 1) % slogans.length; slogan.textContent = slogans[sIdx]; slogan.style.opacity = 1; }, 600);
  }, 8000);

  /* corações caindo */
  (function () {
    const cont = document.getElementById('petals');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = '💛';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.fontSize = (14 + Math.random() * 14) + 'px';
      const d = 9 + Math.random() * 9;
      p.style.animationDuration = d + 's';
      p.style.animationDelay = (-Math.random() * d) + 's';
      cont.appendChild(p);
    }
  })();

  /* ligar o rádio */
  const ligar = document.getElementById('ligar');
  ligar.addEventListener('click', () => {
    ligar.classList.add('oculto');
    ordem = embaralhar(PLAYLIST);
    idx = 0;
    carregar(idx);
    tocar();
    setTimeout(() => anunciar('rádio gv no ar. essa primeira vai pra você, gabryella.'), 900);
  });

  ordem = embaralhar(PLAYLIST);
  carregar(0);
  ico.textContent = '▶';
</script>
</body>
</html>
